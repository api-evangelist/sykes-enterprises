principles:
  - name: Visibility
    description: Cost visibility is provided through contracted reporting agreed in the master services agreement; there is no self-service usage API.
  - name: Allocation
    description: Allocation follows the cost centers and program codes specified in the customer's CX engagement.
  - name: Optimization
    description: Optimization levers are negotiated (volume commitments, FTE staffing models, channel mix) rather than self-service tier changes.
  - name: Accountability
    description: A named Foundever account team and the customer's program owner share accountability for spend versus contracted scope.
